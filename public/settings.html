<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置入口已迁移</title>
  <meta http-equiv="refresh" content="2;url=/?open=plugin-center">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: #fffdf8;
      --text: #1f2933;
      --muted: #5b6773;
      --accent: #a44b24;
      --border: #e6d8c5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(164, 75, 36, 0.12), transparent 36%),
        linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(70, 45, 24, 0.12);
    }

    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 0 0 14px; line-height: 1.6; color: var(--muted); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }
    .primary { background: var(--accent); color: #fff; }
    .secondary { border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <main>
    <h1>设置页已迁移</h1>
    <p>旧设置页已经退役，不再承载独立逻辑。新的设置入口统一收敛到新版主页里的“插件中心”。</p>
    <p>页面会自动跳转到新版入口；如果没有跳转，可手动点击下面的按钮。</p>
    <div class="actions">
      <a class="primary" href="/?open=plugin-center">打开插件中心</a>
      <a class="secondary" href="/">返回主页</a>
    </div>
  </main>
</body>
</html>
