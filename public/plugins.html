<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔌 插件管理 - Journal Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.95;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 5px;
      color: #555;
    }

    .plugin-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }

    .plugin-item:hover {
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .plugin-info {
      flex: 1;
    }

    .plugin-name {
      font-size: 1.3em;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .plugin-desc {
      color: #666;
      font-size: 0.95em;
    }

    .toggle-switch {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 30px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-btn">← 返回主页</a>

    <div class="header">
      <h1>🔌 插件管理</h1>
      <p>启用或禁用日记同步插件</p>
    </div>

    <div class="card">
      <div id="successMessage" class="success-message"></div>

      <div class="info-box">
        💡 启用插件后，相关的配置项会出现在设置页面中。禁用插件后，该功能将不会被调用。
      </div>

      <div class="plugin-item">
        <div class="plugin-info">
          <div class="plugin-name">🌸 flomo</div>
          <div class="plugin-desc">同步日记到 flomo 笔记应用</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="plugin-flomo" onchange="togglePlugin('flomo', this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="plugin-item">
        <div class="plugin-info">
          <div class="plugin-name">🧠 memU</div>
          <div class="plugin-desc">使用 AI 提取记忆并生成建议</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="plugin-memu" onchange="togglePlugin('memu', this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="plugin-item">
        <div class="plugin-info">
          <div class="plugin-name">✈️ Telegram</div>
          <div class="plugin-desc">发送日记到 Telegram 频道</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="plugin-telegram" onchange="togglePlugin('telegram', this.checked)">
          <span class="slider"></span>
        </label>
      </div>

      <div class="plugin-item">
        <div class="plugin-info">
          <div class="plugin-name">🧠 Mem0</div>
          <div class="plugin-desc">AI 记忆系统，自动提取任务和标签</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="plugin-mem0" onchange="togglePlugin('mem0', this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <script>
    // 加载插件状态
    async function loadPlugins() {
      try {
        const response = await fetch('/api/plugins');
        const data = await response.json();

        if (data.ok && data.plugins) {
          document.getElementById('plugin-flomo').checked = data.plugins.flomo || false;
          document.getElementById('plugin-memu').checked = data.plugins.memu || false;
          document.getElementById('plugin-telegram').checked = data.plugins.telegram || false;
          document.getElementById('plugin-mem0').checked = data.plugins.mem0 || false;
        }
      } catch (error) {
        console.error('加载插件状态失败:', error);
      }
    }

    // 切换插件状态
    async function togglePlugin(pluginName, enabled) {
      try {
        const response = await fetch('/api/plugins/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plugin: pluginName, enabled })
        });

        const data = await response.json();

        if (data.ok) {
          showSuccess(`${pluginName} 插件已${enabled ? '启用' : '禁用'}`);
        } else {
          alert('操作失败: ' + data.error);
        }
      } catch (error) {
        alert('操作失败: ' + error.message);
      }
    }

    // 显示成功消息
    function showSuccess(message) {
      const successEl = document.getElementById('successMessage');
      successEl.textContent = message;
      successEl.classList.add('show');
      setTimeout(() => {
        successEl.classList.remove('show');
      }, 3000);
    }

    // 页面加载时加载插件状态
    window.addEventListener('DOMContentLoaded', loadPlugins);
  </script>
</body>
</html>
