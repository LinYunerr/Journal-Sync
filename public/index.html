<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旧主页已退役</title>
  <meta http-equiv="refresh" content="2;url=/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f1e8;
      --panel: #fffdfa;
      --text: #1f2933;
      --muted: #5b6773;
      --accent: #8b5d16;
      --border: #eadfcf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(139, 93, 22, 0.12), transparent 36%),
        linear-gradient(180deg, #fcf7f0 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(78, 55, 23, 0.12);
    }

    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 0 0 14px; line-height: 1.6; color: var(--muted); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }
    .primary { background: var(--accent); color: #fff; }
    .secondary { border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <main>
    <h1>旧主页已退役</h1>
    <p>系统主入口已经切换到新版主页，旧主页不再继续维护，也不再承接插件和设置逻辑。</p>
    <p>页面会自动跳转到新版主页；如果没有跳转，可手动点击下面的按钮。</p>
    <div class="actions">
      <a class="primary" href="/">打开新版主页</a>
      <a class="secondary" href="/?open=plugin-center">打开插件中心</a>
    </div>
  </main>
</body>
</html>
